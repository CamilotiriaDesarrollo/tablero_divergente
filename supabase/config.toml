# Configuración mínima de Supabase local — Tablero Divergente.
# Docs: https://supabase.com/docs/guides/local-development

project_id = "tablero-divergente"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
# Corre supabase/seed.sql en `supabase db reset` / `supabase start`.
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# URL del sitio para enlaces de confirmación/recuperación en local.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true

[storage]
enabled = true
